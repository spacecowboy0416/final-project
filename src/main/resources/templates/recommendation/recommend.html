<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <title>코디 추천</title>

    <link rel="stylesheet" th:href="@{/recommendation/css/recommend.css}">
</head>
<body class="recommend-page">
<div th:replace="~{layout/common :: headerFragment}"></div>

<main class="recommend-main">
    <section class="recommend-wrap">
        <div id="recommendRoot"
             class="recommend-root rc-stack"
             th:attr="data-initial-natural-text=${initialNaturalText},data-kakao-map-api-key=${kakaoMapApiKey},data-recommendation-image-max-bytes=${recommendationImageMaxBytes},data-recommendation-save-enabled=${recommendationSaveEnabled}">

            <section id="composeView" aria-label="추천 입력 화면" class="rc-stack">
                <form id="recommendForm" class="recommend-form">
                    <label class="sr-only" for="naturalText">추천 요청 문장</label>
                    <textarea id="naturalText"
                              class="rc-control recommend-textarea"
                              name="naturalText"
                              rows="4"
                              maxlength="1000"
                              placeholder="예: 내일 비 오는데 출근룩 차분하게 추천해줘"></textarea>
                    <button id="submitButton" class="rc-btn rc-btn-ghost recommend-floating-button recommend-submit-button" type="submit">코디 생성</button>
                </form>

                <section class="recommend-merged-section rc-card" aria-label="추천 입력 상세">
                    <div class="recommend-merged-grid">
                        <!-- 좌측: 이미지 관련 UI를 담당하는 독립 섹션 -->
                        <section class="recommend-pane recommend-media-pane rc-stack" aria-label="이미지 섹션">
                            <div id="imagePreviewCard" class="recommend-image-preview-card">
                                <img id="imagePreview" class="rc-hidden recommend-image" alt="업로드 이미지 미리보기">
                                <div id="imageEmptyState" class="recommend-image-empty">
                                    <strong class="recommend-empty-title">코디에 들어갈 옷 사진을 올려주세요</strong>
                                </div>
                                <!-- 미리보기 카드 내부에서 바로 업로드할 수 있는 버튼 -->
                                <div class="recommend-image-upload-overlay">
                                    <label for="imageFile" class="rc-btn rc-btn-ghost recommend-image-upload-button">사진 업로드</label>
                                </div>
                            </div>

                            <div class="recommend-upload-row">
                                <input id="imageFile" type="file" accept="image/*" hidden>
                                <p id="imageMetaText" class="recommend-meta-text"></p>
                            </div>
                        </section>

                        <!-- 우측: 옵션/날씨/지도 컨트롤을 담당하는 독립 섹션 -->
                        <section class="recommend-pane recommend-control-pane rc-stack" aria-label="컨트롤 섹션">
                            <section class="recommend-options-section" aria-label="추천 옵션">
                                <!-- 성별/브랜드 옵션을 같은 행 컨트롤로 배치 -->
                                <div class="recommend-options">
                                <label class="recommend-field" for="gender">
                                    <span class="recommend-field-label">성별</span>
                                    <select id="gender" name="gender" class="rc-control rc-control--xs recommend-option-select">
                                        <option value="UNISEX">공용</option>
                                        <option value="MALE">남성</option>
                                        <option value="FEMALE">여성</option>
                                    </select>
                                </label>

                                <label class="recommend-brand-toggle" for="brandEnabled">
                                    <span class="recommend-brand-title">브랜드 포함</span>
                                    <input id="brandEnabled" type="checkbox" checked class="recommend-checkbox">
                                </label>
                                </div>
                            </section>

                            <section class="recommend-weather-section" aria-label="날씨 섹션">
                                <!-- 날씨 정보를 지도보다 먼저 보여주기 위한 블록 순서 -->
                                <article class="recommend-weather-card rc-card" aria-label="날씨 정보">
                                    <div class="recommend-weather-top">
                                        <p id="weatherDescription" class="recommend-weather-desc">날씨 정보를 가져오는 중입니다.</p>
                                    </div>

                                    <div class="recommend-weather-grid">
                                        <!-- 위치/상태/현재온도 -->
                                        <div class="recommend-weather-main">
                                            <strong id="locationLabel" class="recommend-weather-location">서울 강남구</strong>
                                            <span id="weatherStatusBadge" class="recommend-weather-badge">불러오는 중</span>
                                            <strong id="weatherTemperature" class="recommend-weather-temperature">-</strong>
                                        </div>
                                        <!-- 상세 지표 4종 -->
                                        <dl class="recommend-weather-list">
                                            <div class="recommend-weather-item">
                                                <dt>체감 온도</dt>
                                                <dd id="weatherFeelsLike">-</dd>
                                            </div>
                                            <div class="recommend-weather-item">
                                                <dt>습도</dt>
                                                <dd id="weatherHumidity">-</dd>
                                            </div>
                                            <div class="recommend-weather-item">
                                                <dt>바람</dt>
                                                <dd id="weatherWind">-</dd>
                                            </div>
                                            <div class="recommend-weather-item recommend-weather-item--last">
                                                <dt>강수량</dt>
                                                <dd id="weatherPrecipitation">-</dd>
                                            </div>
                                        </dl>
                                    </div>
                                </article>
                            </section>

                            <section class="recommend-map-section" aria-label="지도 섹션">
                                <div class="recommend-map-shell">
                                    <div id="map" class="recommend-map" aria-label="지도"></div>
                                    <!-- 카카오 지도 위에 겹쳐 보이는 현위치 버튼 -->
                                    <button id="useCurrentLocationButton" class="rc-btn rc-btn-ghost recommend-floating-button recommend-map-location-button" type="button">현위치</button>
                                </div>
                            </section>
                        </section>
                    </div>
                </section>
            </section>

            <section id="resultView" aria-label="추천 결과 화면" class="rc-hidden rc-stack">
                <div id="resultLayout" class="rc-stack">
                    <div class="rc-stack">
                        <div class="recommend-result-head">
                            <div class="recommend-result-actions">
                                <button id="saveRecommendationButton" class="rc-btn rc-btn-primary" type="button">저장하기</button>
                                <button id="backToComposeButton" class="rc-btn rc-btn-ghost" type="button">다시 추천하기</button>
                            </div>
                        </div>

                        <article class="recommend-summary-card rc-card">
                            <p class="recommend-result-kicker">YOUR REQUEST</p>
                            <p id="resultQueryText" class="recommend-summary-text recommend-summary-text--query"></p>
                        </article>

                        <article class="recommend-summary-card rc-card">
                            <p class="recommend-result-kicker">AI EXPLANATION</p>
                            <div id="resultMetaTags" class="recommend-meta-tags"></div>
                            <p id="resultExplanation" class="recommend-summary-text"></p>
                        </article>

                        <section class="rc-stack" aria-labelledby="resultItemsTitle">
                            <div class="recommend-items-head">
                                <h3 id="resultItemsTitle" class="recommend-items-title">추천 아이템</h3>
                                <span id="resultItemCount" class="recommend-items-count"></span>
                            </div>
                            <div id="resultItems" class="recommend-items-grid"></div>
                        </section>
                    </div>
                </div>
            </section>

            <div id="loadingOverlay" class="rc-hidden recommend-loading-overlay" aria-live="polite">
                <div class="recommend-loading-box rc-card">
                    <div class="rc-spinner" aria-hidden="true"></div>
                    <strong class="recommend-loading-title">추천을 생성하고 있습니다</strong>
                    <p class="recommend-loading-desc">사진과 날씨를 조합해 코디를 찾는 중입니다.</p>
                </div>
            </div>

            <p id="feedbackMessage" class="rc-feedback rc-feedback--default" aria-live="polite"></p>
        </div>
    </section>
</main>

<footer th:replace="~{layout/common :: footerFragment}"></footer>

<script th:src="@{/recommendation/js/recommendation.core.js}"></script>
<script th:src="@{/recommendation/js/recommendation.service.js}"></script>
<script th:src="@{/recommendation/js/recommendation.main.js}"></script>
</body>
</html>
