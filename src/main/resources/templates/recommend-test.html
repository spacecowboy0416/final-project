<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common :: configFragment}"></th:block>
    <title>코디 추천 테스트</title>
    <style>
        .panel-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #fff;
            border: 1px solid #d8dde3;
            border-radius: 12px;
            padding: 18px;
        }

        .panel h2 {
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .field input, .field textarea {
            padding: 10px 12px;
            border: 1px solid #c7ced6;
            border-radius: 8px;
            font-size: 14px;
        }

        .run-btn {
            width: 100%;
            margin-top: 8px;
            background: #0f4c81;
            color: #fff;
            font-weight: 700;
        }

        .run-btn:hover {
            background: #09365d;
        }

        .status {
            font-size: 14px;
            margin-top: 10px;
            color: #404b57;
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #0f1720;
            color: #d7e2ef;
            border-radius: 8px;
            padding: 12px;
            max-height: 380px;
            overflow: auto;
        }

        .items {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .item-card {
            border: 1px solid #d6dde4;
            border-radius: 10px;
            padding: 10px;
            background: #fdfefe;
        }

        .item-card img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .item-card p {
            font-size: 13px;
            margin-bottom: 6px;
        }

        @media (max-width: 960px) {
            .panel-wrap {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{common :: headerFragment}"></div>

<main class="main-content">
    <h1 style="margin-bottom: 18px;">코디 추천 테스트 페이지</h1>

    <div class="panel-wrap">
        <section class="panel">
            <h2>입력</h2>
            <div class="field">
                <label for="runMode">실행 모드</label>
                <select id="runMode">
                    <option value="real" selected>REAL (Gemini 실패 시 에러 반환)</option>
                    <option value="test">TEST (Gemini 실패 시 fallback 허용)</option>
                </select>
            </div>
            <div class="field">
                <label for="inputText">텍스트 프롬프트</label>
                <textarea id="inputText" rows="4">비 오는 날 출근 코디 추천해줘. 미니멀 스타일 선호해.</textarea>
            </div>
            <div class="field">
                <label for="imageUrl">이미지 URL</label>
                <input id="imageUrl" type="text" value="https://picsum.photos/seed/main-item/400/500">
            </div>
            <div class="field">
                <label for="weatherJson">weather (팀 계약 DTO)</label>
                <textarea id="weatherJson" rows="4">{"temp": 12, "conditionText": "RAIN", "precipitationType": "RAIN", "precipitationProb": 70, "humidity": 60, "windSpeed": 3.2}</textarea>
            </div>
            <div class="field">
                <label for="locationJson">location (팀 계약 DTO)</label>
                <textarea id="locationJson" rows="3">{"city":"Seoul","country":"KR","latitude":37.5665,"longitude":126.9780}</textarea>
            </div>
            <button id="runButton" class="btn run-btn" type="button">테스트 추천 실행</button>
            <p id="statusMessage" class="status">대기 중</p>
        </section>

        <section class="panel">
            <h2>출력</h2>
            <h3 style="margin-bottom: 6px;">ai_blueprint</h3>
            <pre id="blueprintResult">아직 결과 없음</pre>
            <h3 style="margin: 14px 0 8px;">최종 추천 아이템</h3>
            <div id="itemsResult" class="items"></div>
        </section>
    </div>
</main>

<footer th:replace="~{common :: footerFragment}"></footer>

<script>
    const runButton = document.getElementById("runButton");
    const statusMessage = document.getElementById("statusMessage");
    const blueprintResult = document.getElementById("blueprintResult");
    const itemsResult = document.getElementById("itemsResult");

    function renderItems(items) {
        if (!items || items.length === 0) {
            itemsResult.innerHTML = "<p>아이템 없음</p>";
            return;
        }
        itemsResult.innerHTML = items.map((item) => `
            <article class="item-card">
                <img src="${item.product.imageUrl || 'https://via.placeholder.com/320x420?text=No+Image'}" alt="${item.itemName}">
                <p><strong>${item.slotKey}</strong> | ${item.itemName}</p>
                <p>점수: ${item.matchScore}</p>
                <p>단계: ${item.selectionStage}</p>
                <p>상품: ${item.product.name} / ${item.product.price}원</p>
                <p>${item.reasoning}</p>
                <p><a href="${item.product.link}" target="_blank" rel="noopener">네이버 검색 열기</a></p>
            </article>
        `).join("");
    }

    runButton.addEventListener("click", async () => {
        statusMessage.textContent = "요청 중...";
        itemsResult.innerHTML = "";

        let weatherJson;
        let locationJson;
        try {
            weatherJson = JSON.parse(document.getElementById("weatherJson").value);
            locationJson = JSON.parse(document.getElementById("locationJson").value);
        } catch (e) {
            statusMessage.textContent = "JSON 형식이 올바르지 않습니다.";
            return;
        }

        const payload = {
            inputText: document.getElementById("inputText").value,
            imageUrl: document.getElementById("imageUrl").value,
            weather: weatherJson,
            location: locationJson,
            userTags: ["minimal", "work"]
        };

        try {
            const mode = document.getElementById("runMode").value;
            const endpoint = mode === "test" ? "/api/recommendations/test" : "/api/recommendations";
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                throw new Error("API 응답 실패: " + response.status);
            }
            const data = await response.json();
            statusMessage.textContent = `완료: ${data.status} | source=${data.draftSource} | recId=${data.recId}`;
            blueprintResult.textContent = JSON.stringify(data.aiBlueprint, null, 2);
            renderItems(data.finalItems);
        } catch (err) {
            statusMessage.textContent = "실패: " + err.message;
            blueprintResult.textContent = "오류 발생";
        }
    });
</script>
</body>
</html>
