<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <link rel="stylesheet" th:href="@{/closet/css/closet.css}">
    <title>나의 옷장</title>
</head>
<body>
    <div th:replace="~{layout/common :: headerFragment}"></div>

    <main class="main-content">
        
        <div class="section-header">
            <h2 class="section-title">AI 코디 룩북</h2>
            <a th:href="@{/recommend}" class="btn-black-pill">새 코디 추천받기</a>
        </div>
        
        <div th:if="${#lists.isEmpty(savedCoordis)}" class="empty-msg-box">
            <p>저장된 AI 추천 코디가 없습니다.</p>
        </div>

        <div th:unless="${#lists.isEmpty(savedCoordis)}" class="slider-container" style="margin-bottom: 50px;">
            <div class="coordi-card clickable-card" th:each="coordi : ${savedCoordis}"
                 th:data-id="${coordi.recId}"
                 th:data-title="${coordi.inputText}"
                 th:data-desc="${coordi.aiExplanation}"
                 th:data-date="${#temporals.format(coordi.createdAt, 'yyyy-MM-dd HH:mm')}"
                 onclick="openCoordiModal(this)">
                <span class="date-badge" th:text="${#temporals.format(coordi.createdAt, 'yyyy-MM-dd HH:mm')}">날짜</span>
                <h5 th:text="${coordi.inputText}">입력 텍스트</h5>
                <p class="ai-desc-text" th:text="${coordi.aiExplanation}"></p>
            </div>
        </div>

        <hr class="section-divider">

        <div class="section-header">
            <h2 class="section-title">나의 코디 세트</h2>
            <button class="btn-black-pill" onclick="openAddSetModal()">코디 세트 등록</button>
        </div>

        <div th:if="${#lists.isEmpty(manualSets)}" class="empty-msg-box">
            <p>직접 등록한 코디 세트가 없습니다.</p>
        </div>

        <div th:unless="${#lists.isEmpty(manualSets)}" class="closet-grid" style="margin-bottom: 50px;">
            <div class="item-card" th:each="set : ${manualSets}">
                <h5 class="set-title" th:text="${set.inputText}">세트 이름</h5>
                <div class="set-items-list">
                    <div class="set-item-row" th:each="cItem : ${set.coordiItems}">
                        <img th:src="${cItem.imageUrl}" class="set-item-img" alt="세트 이미지">
                        <span class="set-item-name" th:text="${cItem.name}">상품명</span>
                    </div>
                </div>
                <form th:action="@{/closet/delete-set/{recId}(recId=${set.recId})}" method="post" onsubmit="return confirm('이 세트를 삭제하시겠습니까?');" style="margin-top: 15px;">
                    <button type="submit" class="btn-delete-item">세트 삭제</button>
                </form>
            </div>
        </div>

        <hr class="section-divider">

        <div class="section-header">
            <h2 class="section-title">나의 옷장 (개별)</h2>
            <button class="btn-black-pill" onclick="openAddItemModal()">개별 옷 등록</button>
        </div>
        
        <div th:if="${#lists.isEmpty(items)}" class="empty-msg-box">
            <p>옷장에 등록된 개별 아이템이 없습니다.</p>
        </div>

        <div th:unless="${#lists.isEmpty(items)}" class="closet-grid">
            <div class="item-card clickable-card" th:each="item : ${items}">
                <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" class="item-image" alt="옷 이미지">
                <div th:unless="${item.imageUrl != null}" class="item-image item-image-empty">이미지 없음</div>
                
                <div class="item-info">
                    <div class="item-meta-header">
                        <span class="badge" th:text="${item.season}">계절</span>
                        <span class="item-category" th:text="${item.categoryName != null ? item.categoryName : '미분류'}">카테고리</span>
                    </div>
                    
                    <div th:if="${item.brand != null and item.brand != ''}" class="item-brand" th:text="${item.brand}">브랜드</div>
                    <h4 class="item-name" th:text="${item.name}">옷 이름</h4>
                    
                    <div class="item-tags">
                        <span th:if="${item.color != null and item.color != ''}" class="info-tag" th:text="${item.color}">색상</span>
                        <span th:if="${item.material != null and item.material != ''}" class="info-tag" th:text="${item.material}">소재</span>
                        <span th:if="${item.fit != null and item.fit != ''}" class="info-tag" th:text="${item.fit}">핏</span>
                        <span th:if="${item.style != null and item.style != ''}" class="info-tag" th:text="${item.style}">스타일</span>
                    </div>
                    
                    <form th:action="@{/closet/delete/{itemId}(itemId=${item.itemId})}" method="post" onsubmit="return confirm('이 옷을 정말 삭제하시겠습니까?');" style="margin-top: auto;">
                        <button type="submit" class="btn-delete-item">삭제</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="coordiModal" class="modal-overlay">
        <div class="closet-modal-content">
            <div class="closet-modal-header">
                <h3 style="margin: 0; font-size: 1.2rem;">코디 상세 정보</h3>
                <span class="closet-modal-close" onclick="closeCoordiModal()">&times;</span>
            </div>
            <div class="closet-modal-body">
                <span id="modalDate" style="color: #999; font-size: 0.85rem;">날짜</span>
                <h3 id="modalTitle" style="margin: 10px 0 20px 0; font-weight: 800;">코디 제목</h3>
                <div id="modalDesc" class="closet-desc-box"></div>
            </div>
            <div class="closet-modal-footer">
                <button type="button" class="btn-closet outline" onclick="editCoordi()">변경하기</button>
                <button type="button" class="btn-closet primary" onclick="shareCoordi()">자랑하기</button>
                <form id="deleteCoordiForm" method="post" style="flex: 1; display: flex;">
                    <button type="submit" class="btn-closet danger" onclick="return confirm('이 코디를 삭제하시겠습니까?');">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <div id="addItemModal" class="modal-overlay">
        <div class="closet-modal-content">
            <div class="closet-modal-header">
                <h3 style="margin: 0; font-size: 1.2rem;">개별 옷 등록</h3>
                <span class="closet-modal-close" onclick="closeAddItemModal()">&times;</span>
            </div>
            <form th:action="@{/closet/add}" method="post" enctype="multipart/form-data" id="addItemForm" style="display: contents;">
                <div class="closet-modal-body">
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label class="closet-label">사진 등록 (필수)</label>
                        <div class="closet-upload-box" onclick="document.getElementById('imageInput').click()">
                            <div class="upload-placeholder">
                                <span style="font-size: 1.5rem; margin-bottom: 5px;">+</span>
                                <span>사진 추가하기 (여러 장 가능)</span>
                            </div>
                        </div>
                        <input type="file" name="imageFiles" id="imageInput" accept="image/*" multiple style="display: none;" required>
                        <div id="imagePreviewContainer" class="image-preview-container"></div>
                    </div>

                    <div class="form-group">
                        <label class="closet-label">옷 이름 (필수)</label>
                        <input type="text" name="name" class="closet-input" placeholder="예: 무탠다드 쿨 스웨트 셔츠" required>
                    </div>

                    <div class="form-group">
                        <label class="closet-label">카테고리</label>
                        <div class="closet-pill-container" id="categoryPillGroup">
                            <button type="button" class="closet-pill active" data-id="1">상의</button>
                            <button type="button" class="closet-pill" data-id="2">하의</button>
                            <button type="button" class="closet-pill" data-id="3">아우터</button>
                            <button type="button" class="closet-pill" data-id="4">신발</button>
                            <button type="button" class="closet-pill" data-id="5">가방</button>
                            <button type="button" class="closet-pill" data-id="6">모자</button>
                            <button type="button" class="closet-pill" data-id="7">기타</button>
                        </div>
                        <input type="hidden" name="categoryId" id="selectedCategoryId" value="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="closet-label">계절</label>
                        <div class="closet-pill-container" id="seasonPillGroup">
                            <button type="button" class="closet-pill active" data-val="SPRING">봄</button>
                            <button type="button" class="closet-pill" data-val="SUMMER">여름</button>
                            <button type="button" class="closet-pill" data-val="FALL">가을</button>
                            <button type="button" class="closet-pill" data-val="WINTER">겨울</button>
                        </div>
                        <input type="hidden" name="season" id="selectedSeason" value="SPRING" required>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #f0f0f0; margin: 20px 0;">
                    <label class="closet-label" style="color: #666;">상세 정보 (선택사항)</label>
                    <div class="form-row-2">
                        <div class="form-group">
                            <input type="text" name="brand" class="closet-input" placeholder="브랜드 (예: 나이키)">
                        </div>
                        <div class="form-group">
                            <input type="text" name="color" class="closet-input" placeholder="색상 (예: 블랙)">
                        </div>
                        <div class="form-group">
                            <input type="text" name="material" class="closet-input" placeholder="소재 (예: 코튼)">
                        </div>
                        <div class="form-group">
                            <input type="text" name="fit" class="closet-input" placeholder="핏 (예: 오버핏)">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <input type="text" name="style" class="closet-input" placeholder="스타일 (예: 캐주얼)">
                        </div>
                    </div>

                </div>
                <div class="closet-modal-footer">
                    <button type="submit" class="btn-closet primary full-width">옷장에 추가하기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addSetModal" class="modal-overlay">
        <div class="closet-modal-content">
            <div class="closet-modal-header">
                <h3 style="margin: 0; font-size: 1.2rem;">코디 세트 등록</h3>
                <span class="closet-modal-close" onclick="closeAddSetModal()">&times;</span>
            </div>
            <form th:action="@{/closet/add-set}" method="post" enctype="multipart/form-data" id="addSetForm" style="display: contents;">
                <div class="closet-modal-body">
                    <div class="form-group">
                        <label class="closet-label">코디 세트 이름</label>
                        <input type="text" name="setName" class="closet-input" placeholder="예: 봄맞이 데이트룩" required>
                    </div>
                    <div class="form-group">
                        <label class="closet-label">세트 계절</label>
                        <div class="closet-pill-container" id="setSeasonPillGroup">
                            <button type="button" class="closet-pill active" data-val="SPRING">봄</button>
                            <button type="button" class="closet-pill" data-val="SUMMER">여름</button>
                            <button type="button" class="closet-pill" data-val="FALL">가을</button>
                            <button type="button" class="closet-pill" data-val="WINTER">겨울</button>
                        </div>
                        <input type="hidden" name="season" id="setSelectedSeason" value="SPRING" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label class="closet-label">세트 구성품 사진 등록</label>
                        <div class="closet-upload-box" onclick="document.getElementById('setImageInput').click()">
                            <div class="upload-placeholder">
                                <span style="font-size: 1.5rem; margin-bottom: 5px;">+</span>
                                <span>구성품 사진 추가하기</span>
                            </div>
                        </div>
                        <input type="file" name="imageFiles" id="setImageInput" accept="image/*" multiple style="display: none;" required>
                        <div id="setPreviewContainer" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;"></div>
                    </div>
                </div>
                <div class="closet-modal-footer">
                    <button type="submit" class="btn-closet primary full-width">세트로 저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{layout/common :: footerFragment}"></footer>
    <script th:src="@{/closet/js/closet.js}"></script>
</body>
</html>
