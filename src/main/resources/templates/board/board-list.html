<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <meta charset="UTF-8">
    <title>코디 공유 게시판</title>

    <link rel="stylesheet" th:href="@{/board/css/board-common.css}">
    <link rel="stylesheet" th:href="@{/board/css/board-list.css}">
</head>
<body>
<div th:replace="~{layout/common :: headerFragment}"></div>

<main class="board-list-page">

    <!-- 상단 소개 + 필터 카드 -->
    <section class="board-hero">
        <div class="board-hero__top">
            <div class="board-hero__text">
                <p class="board-hero__eyebrow">Fashion Community</p>
                <h1 class="board-hero__title">코디 공유 게시판</h1>
            </div>

            <a href="/board/write" class="board-dark-btn board-write-btn">코디 공유하기</a>
        </div>

        <p class="board-hero__desc">
            날씨와 스타일, 상황에 맞는 코디를 피드처럼 둘러보고
            저장한 코디를 게시글로 자연스럽게 공유해보세요.
        </p>

        <div class="board-hero__bottom">
            <div class="board-filter-panel">
                <div class="board-filter-inline">
                    <span>날씨</span>
                    <select id="weather">
                        <option value="">전체</option>
                        <option value="clear">맑음</option>
                        <option value="partly_cloudy">구름 조금</option>
                        <option value="cloudy">흐림</option>
                        <option value="windy">바람 많음</option>
                        <option value="rain">비</option>
                        <option value="cloudy_rain">흐리고 비</option>
                        <option value="thunderstorm">뇌우</option>
                        <option value="thunderstorm_rain">뇌우와 비</option>
                        <option value="snow">눈</option>
                        <option value="cloudy_snow">흐리고 눈</option>
                        <option value="sleet">진눈깨비</option>
                        <option value="hail">우박</option>
                    </select>
                </div>

                <div class="board-filter-inline">
                    <span>스타일</span>
                    <select id="style">
                        <option value="">전체</option>
                        <option value="minimal">미니멀</option>
                        <option value="casual">캐주얼</option>
                        <option value="street">스트릿</option>
                        <option value="classic">클래식</option>
                        <option value="lovely">러블리</option>
                        <option value="amikaji">아메카지</option>
                        <option value="gorpcore">고프코어</option>
                        <option value="chic">시크</option>
                    </select>
                </div>

                <div class="board-filter-inline">
                    <span>TPO</span>
                    <select id="tpo">
                        <option value="">전체</option>
                        <option value="daily">일상</option>
                        <option value="office">출근</option>
                        <option value="date">데이트</option>
                        <option value="wedding">하객</option>
                        <option value="formal">격식</option>
                        <option value="exercise">운동</option>
                        <option value="travel">여행</option>
                        <option value="camping">캠핑</option>
                    </select>
                </div>

                <div class="board-filter-actions">
                    <button type="button" class="board-dark-btn board-search-btn" id="searchBtn">검색</button>
                    <button type="button" class="board-ghost-btn board-reset-btn" id="resetBtn">초기화</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 피드 영역 -->
    <section class="board-feed-section">
        <div class="board-feed-section__header">
            <div class="board-feed-section__title-wrap">
                <h2>오늘의 코디 피드</h2>
                <p>다른 사용자가 공유한 코디를 피드 형태로 둘러보세요.</p>
            </div>

            <div class="board-feed-section__controls">
                <span id="postCountText">총 0개의 게시글</span>

                <div class="board-sort-buttons">
                    <button type="button" class="board-sort-btn active" data-sort="latest">최신순</button>
                    <button type="button" class="board-sort-btn" data-sort="view">조회순</button>
                </div>
            </div>
        </div>

        <section id="postList" class="board-feed">
            <div class="board-feed__col" id="postColLeft"></div>
            <div class="board-feed__col" id="postColRight"></div>
        </section>
    </section>

</main>

<footer th:replace="~{layout/common :: footerFragment}"></footer>

<script th:src="@{/board/js/board-common.js}"></script>
<script th:src="@{/board/js/board-list.js}"></script>
</body>
</html>
