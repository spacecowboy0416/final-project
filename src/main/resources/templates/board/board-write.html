<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <meta charset="UTF-8">
    <title>게시글 작성</title>

    <link rel="stylesheet" th:href="@{/board/css/board-common.css}">
    <link rel="stylesheet" th:href="@{/board/css/board-form.css}">
</head>
<body>
<div th:replace="~{layout/common :: headerFragment}"></div>

<main class="board-page">
    <section class="board-form-card">
        <div class="board-form-header">
            <p class="board-page-header__eyebrow">Board Write</p>
            <h1>코디 공유 게시글 작성</h1>
            <p>저장한 코디를 불러와 게시글과 함께 공유해보세요.</p>
        </div>

        <input type="hidden" id="recId">

        <section class="board-selected-coordi">
            <div class="board-selected-coordi__header">
                <div>
                    <h3>선택한 코디</h3>
                    <p>저장한 코디를 선택하면 게시글에 연결됩니다.</p>
                </div>
                <button type="button" class="board-secondary-btn" id="loadCoordiBtn">
                    저장한 코디 불러오기
                </button>
            </div>

            <div id="selectedCoordiPreview" class="board-selected-coordi__empty">
                아직 불러온 코디가 없습니다.
            </div>
        </section>

        <div class="board-form-grid">
            <div class="board-field">
                <label for="title">제목</label>
                <input type="text" id="title" maxlength="120" placeholder="제목을 입력하세요">
            </div>

            <div class="board-field">
                <label for="content">내용</label>
                <textarea id="content" placeholder="내용을 입력하세요"></textarea>
            </div>

            <div class="board-field">
                <label for="isPublic">공개 여부</label>
                <select id="isPublic">
                    <option value="true">공개</option>
                    <option value="false">비공개</option>
                </select>
            </div>
        </div>

        <div class="board-form-actions">
            <button type="button" class="board-secondary-btn" id="cancelBtn">취소</button>
            <button type="button" class="board-primary-btn" id="createBtn">등록</button>
        </div>
    </section>
</main>

<div id="coordiModal" class="board-modal hidden">
    <div class="board-modal__backdrop"></div>
    <div class="board-modal__content">
        <div class="board-modal__header">
            <div>
                <h3>저장한 코디 선택</h3>
                <p>게시글에 연결할 코디를 골라주세요.</p>
            </div>
            <button type="button" class="board-secondary-btn" id="closeCoordiModalBtn">닫기</button>
        </div>

        <div id="coordiList" class="board-coordi-list"></div>
    </div>
</div>

<footer th:replace="~{layout/common :: footerFragment}"></footer>

<script th:src="@{/board/js/board-write.js}"></script>
</body>
</html>
