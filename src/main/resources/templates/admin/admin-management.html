<!doctype html>
<html lang="ko">

  <head>
    <th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}" />
    <link rel="stylesheet" th:href="@{/admin/css/admin-item.css}" />
    <title>관리자 페이지</title>
  </head>

  <body>
    <div th:replace="~{layout/common :: headerFragment}"></div>

    <main class="admin-main">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <h2 class="admin-sidebar-title">관리자 메뉴</h2>
        <nav class="admin-nav">
          <ul>
            <li>
              <a href="#user-management"><span>회원 관리</span></a>
            </li>
            <li>
              <a href="#item-management"><span>의류 아이템 관리</span></a>
            </li>
            <li>
              <a href="#community-management"><span>커뮤니티 관리</span></a>
            </li>
            <li>
              <a href="#system-stats"><span>시스템 통계</span></a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <section class="admin-content">
        <div class="glass-panel" id="initial-panel">
          <h1 class="glass-panel-title">관리자 대시보드</h1>
          <p class="glass-panel-text">
            좌측 메뉴를 선택하여 기능을 관리하세요.
          </p>
        </div>
        <!-- 각 메뉴에 해당하는 컨텐츠가 동적으로 이 영역에 로드될 예정 -->
        <div id="admin-content-area"></div>
      </section>
    </main>
    <footer th:replace="~{layout/common :: footerFragment}"></footer>

    <!-- Templates for dynamic content -->
    <template id="item-management-template">
      <div class="glass-panel">
        <h1 class="glass-panel-title">의류 아이템 관리</h1>
        <div class="item-management-grid">
          <!-- 태그 등록 및 수정 폼 -->
          <div class="tag-form-container">
            <h2 class="item-management-title">태그 등록/수정</h2>
            <form id="tag-form">
              <input type="hidden" id="tag-id" name="tagId" />
              <div class="form-group">
                <label for="tag-name">태그명</label>
                <input type="text" id="tag-name" name="tagName" class="form-input" placeholder="예: #청바지, #봄코디" />
              </div>
              <div class="form-group">
                <label for="tag-category">카테고리</label>
                <select id="tag-category" name="tagCategory" class="form-select">
                  <option value="" disabled selected>카테고리 선택</option>
                  <option value="TYPE">종류</option>
                  <option value="STYLE">스타일</option>
                  <option value="COLOR">색상</option>
                  <option value="MATERIAL">소재</option>
                  <option value="SEASON">계절</option>
                </select>
              </div>
              <div class="form-actions">
                <button type="button" onclick="clearTagForm()" class="btn btn-secondary">
                  초기화
                </button>
                <button type="submit" class="btn btn-primary">저장</button>
              </div>
            </form>
          </div>

          <!-- 등록된 태그 목록 -->
          <div class="tag-list-container">
            <h2 class="item-management-title">태그 목록</h2>
            <div id="tag-list" class="tag-list">
              <!-- Example Tag Item -->
              <div class="tag-item" data-id="1">
                <div class="tag-item-info">
                  <span class="tag-name">#청바지</span>
                  <span class="tag-category">(종류)</span>
                </div>
                <div class="tag-item-actions">
                  <button onclick="editTag(1, '청바지', 'TYPE')" class="btn-edit">
                    수정
                  </button>
                  <button onclick="deleteTag(1)" class="btn-delete">
                    삭제
                  </button>
                </div>
              </div>
              <div class="tag-item" data-id="2">
                <div class="tag-item-info">
                  <span class="tag-name">#오버핏</span>
                  <span class="tag-category">(스타일)</span>
                </div>
                <div class="tag-item-actions">
                  <button onclick="editTag(2, '오버핏', 'STYLE')" class="btn-edit">
                    수정
                  </button>
                  <button onclick="deleteTag(2)" class="btn-delete">
                    삭제
                  </button>
                </div>
              </div>
              <!-- AJAX로 로드될 태그들... -->
              <p class="empty-list-message" style="display: none">
                등록된 태그가 없습니다.
              </p>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script th:src="@{/admin/js/admin-management.js}"></script>
  </body>

</html>
