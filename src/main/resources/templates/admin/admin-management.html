<!doctype html>
<html lang="ko">

  <head>
    <th:block th:replace="~{layout/common :: configFragment}"></th:block>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}" />
    <link rel="stylesheet" th:href="@{/admin/css/admin-item.css}" />
    <link rel="stylesheet" th:href="@{/admin/css/admin-user.css}" />
    <title>관리자 페이지</title>
  </head>

  <body>
    <div th:replace="~{layout/common :: headerFragment}"></div>

    <main class="admin-main">
      <!-- Sidebar -->
      <aside class="admin-sidebar">
        <h2 class="admin-sidebar-title">관리자 메뉴</h2>
        <nav class="admin-nav">
          <ul>
            <li>
              <a href="#user-management"><span>회원 관리</span></a>
            </li>
            <li>
              <a href="#item-management"><span>의류 아이템 관리</span></a>
            </li>
            <li>
              <a href="#community-management"><span>커뮤니티 관리</span></a>
            </li>
            <li>
              <a href="#system-stats"><span>시스템 통계</span></a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <section class="admin-content">
        <div class="glass-panel" id="initial-panel">
          <h1 class="glass-panel-title">관리자 대시보드</h1>
          <p class="glass-panel-text">
            좌측 메뉴를 선택하여 기능을 관리하세요.
          </p>
        </div>
        <!-- 각 메뉴에 해당하는 컨텐츠가 동적으로 이 영역에 로드될 예정 -->
        <div id="admin-content-area"></div>
      </section>
    </main>
    <footer th:replace="~{layout/common :: footerFragment}"></footer>

    <!-- Templates for dynamic content -->
    <template id="item-management-template">
        <div class="glass-panel max-w-5xl mx-auto" id="item-management-content">
            <h1 class="glass-panel-title">의류 아이템 태그 관리</h1>
            <p class="mb-8 text-base text-gray-300">관리할 태그 종류를 선택하세요. 선택된 종류의 태그 목록이 나타납니다.</p>

            <!-- Tag Type Selector -->
            <div class="mb-8">
                <select id="tag-type-selector" class="form-select w-full md:w-1/2 lg:w-1/3 text-lg bg-gray-800/50 border-gray-700 text-white rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="">-- 태그 종류 선택 --</option>
                    <option th:each="type : ${tagTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>

            <!-- Area for tags to be loaded into -->
            <div id="tag-content-area" class="mt-4">
                <!-- Content will be loaded here by JS -->
            </div>
        </div>
    </template>

    <template id="user-management-template">
      <div class="glass-panel">
        <h1 class="glass-panel-title">회원 관리</h1>
        <div class="user-management-controls">
          <div class="filter-group">
            <label for="role-filter">권한:</label>
            <select id="role-filter" class="form-select">
              <option value="ALL">전체</option>
              <option value="USER">일반 사용자</option>
              <option value="ADMIN">관리자</option>
              <option value="MASTER">마스터 관리자</option>
            </select>
          </div>
          <div class="search-group">
            <input type="text" id="user-search-input" class="form-input" placeholder="닉네임 또는 이메일로 검색">
            <button id="search-user-btn" class="btn btn-primary">검색</button>
          </div>
        </div>
        <div class="user-list-container">
          <table class="user-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>프로필</th>
                <th id="nickname-sort-header" class="sortable">
                  닉네임
                  <span class="sort-control">
                    <span class="sort-arrow asc"></span>
                    <span class="sort-arrow desc"></span>
                  </span>
                </th>
                <th>이메일</th>
                <th>소셜</th>
                <th>역할</th>
                <th>상태</th>
                <th>가입일</th>
                <th>마지막 로그인</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <!-- User data will be populated here by JS -->
            </tbody>
          </table>
          <p class="empty-list-message" style="display: none;">
            해당 조건의 회원이 없습니다.
          </p>
        </div>
      </div>
    </template>

    <script th:src="@{/admin/js/admin-management.js}"></script>
  </body>

</html>
