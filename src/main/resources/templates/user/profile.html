<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>COORDi - 내 프로필</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}" />
  </head>
  <body>
    <div>
      <h2>👤 내 프로필</h2>

      <!-- 이미지가 없을 경우 기본 아바타 이미지를 보여주도록 설정 -->
      <img th:src="${user.profileImageUrl}" alt="프로필 이미지" />

      <p>
        <strong>닉네임</strong>
        <span th:text="${user.nickname}">닉네임 없음</span>
      </p>
      <p>
        <strong>이메일</strong>
        <span th:text="${user.email}">이메일 없음</span>
      </p>
      <p>
        <strong>로그인 경로</strong>
        <span th:text="${user.provider}">Google</span>
      </p>
      <p>
        <strong>사용자 권한</strong>
        <span th:text="${user.role}">USER</span>
      </p>
      <p>
        <strong>가입일</strong>
        <span th:text="${user.createdAt}">2026-03-12</span>
      </p>

      <a th:href="@{/}">홈으로 돌아가기</a>
    </div>
  </body>
</html>
