<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <th:block th:fragment="configFragment">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta name="referrer" content="no-referrer-when-downgrade">

        <link class="logoicon" rel="icon" th:href="@{/main/images/corailogo.png}">

        <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.replay.min.js"
            crossorigin="anonymous"></script>
        <script th:inline="javascript">
            const sentryDsn = /*[[${SENTRY_DSN_FRONTEND}]]*/ '';
            if (sentryDsn) {
                Sentry.init({
                    dsn: sentryDsn,
                    integrations: [
                        Sentry.browserTracingIntegration(),
                        Sentry.replayIntegration(),
                    ],
                    tracesSampleRate: 1.0,
                    replaysSessionSampleRate: 0.1,
                    replaysOnErrorSampleRate: 1.0,
                });
            }
        </script>

        <link rel="stylesheet" th:href="@{/common/css/common.css}">
        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/login/js/login-alert.js}"></script>
    </th:block>

    <header th:fragment="headerFragment" class="site-header">
        <div class="header-container">
            <h1 class="logo">
                <a th:href="@{/}"><th:block th:replace="~{layout/logo}"></th:block></a>
            </h1>
            <ul class="nav-menu">
                <li><a th:href="@{/recommend}">코디추천</a></li>
                <li><a th:href="@{/closet}">나의옷장</a></li>
                <li><a th:href="@{/board}">커뮤니티</a></li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin-management}" style="color: #dc3545; font-weight: 800;">관리자 메뉴</a>
                </li>
                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/login}" class="btn login-btn">로그인 / 회원가입</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <button type="submit" class="btn login-btn" style="background-color: #6c757d;">로그아웃</button>
                    </form>
                </li>
            </ul>
        </div>
    </header>

    <footer th:fragment="footerFragment" class="site-footer">
    <p>&copy; 2026 Coordi Project. All rights reserved.</p>

    <div id="globalModal" class="modal-overlay" style="z-index: 9999;">
        <div class="global-modal-box">
            <h3 id="globalModalTitle" class="global-modal-title">알림</h3>
            <p id="globalModalMessage" class="global-modal-msg">메시지 내용</p>
            <div class="global-modal-actions">
                <button type="button" id="globalModalCancelBtn" class="btn-global cancel" onclick="closeGlobalModal()">취소</button>
                <button type="button" id="globalModalConfirmBtn" class="btn-global confirm">확인</button>
            </div>
        </div>
    </div>

    <script th:src="@{/common/js/common.js}"></script>
</footer>

</html>
