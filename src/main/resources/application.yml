server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: coordi

  profiles:
    include: secret

  # 1. Database (RDS/MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # 2. Thymeleaf (FE)
  thymeleaf:
    cache: false # 개발 단계에서는 false 권장
    prefix: classpath:/templates/
    suffix: .html

  # 3. Security & OAuth 2.0 (Google, Kakao)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar # 캘린더 권한 추가
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # 4. File Upload (S3)
  servlet:
    multipart:
      max-file-size: ${recommendation.image.max-size:5MB}
      max-request-size: ${recommendation.image.max-size:5MB}
      
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
      additional-paths: src/main/resources/templates
  web:
    resources:
      chain:
        cache: false

# 5. MyBatis 설정
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true # DB의 snake_case를 Java의 camelCase로 매핑
    jdbc-type-for-null: "NULL"
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-aliases-package: com.finalproject.coordi

# 6. Doc 관리 

# 7. Recommendation 입력 이미지 제한
recommendation:
  image:
    max-size: 5MB

# 8. 커스텀 API 키 관리 (Gemini, OpenWeatherMap)
external:
  api:
    gemini:
      endpoint: ${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com} #SDK 엔드포인트
      model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
      url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent} #REST API URL
      key: ${GEMINI_API_KEY}
    shopping:
      endpoint: ${SHOPPING_API_ENDPOINT:https://openapi.naver.com/v1/search/shop.json}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
    weather:
      key: ${WEATHER_API_KEY}
      redis:
        key-prefix: ${WEATHER_REDIS_KEY_PREFIX:weather:district}
    kakao-map:
      endpoint: ${KAKAO_MAP_ENDPOINT:https://dapi.kakao.com/v2/local/geo/coord2address.json}
      js-key: ${KAKAO_MAP_JS_KEY:}
      admin-key: ${KAKAO_MAP_ADMIN_KEY:}
      auth-scheme: ${KAKAO_MAP_AUTH_SCHEME:KakaoAK}
  storage:
    image:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      base-url: ${IMAGE_STORAGE_BASE_URL:}
      extension: ${IMAGE_STORAGE_EXTENSION:.jpg}
      recommendation-path: ${IMAGE_STORAGE_RECOMMENDATION_PATH:recommendations}

# 9. Sentry (Monitoring)
sentry:
  dsn: ${SENTRY_DSN_BACKEND}
  dsn-frontend: ${SENTRY_DSN_FRONTEND}
  traces-sample-rate: 1.0 # 추적할 Event의 비율 설정 - 1.0은 100% 추적, 아직 배포 이전이므로 1.0으로 설정
  exception-resolver-order: -2147483647 # Order가 낮을수록 먼저 처리됨, Sentry가 예외를 가장 먼저 처리하도록 설정

# 10. Logging 설정 통합
logging:
  level:
    root: INFO
    "[com.finalproject.coordi]": DEBUG
    "[com.finalproject.coordi.closet.mapper]": TRACE
    "[com.finalproject.coordi.recommend.mapper]": TRACE
    "[com.finalproject.coordi.errorlog.mapper]": TRACE
