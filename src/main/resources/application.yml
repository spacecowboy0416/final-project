server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: coordi

  profiles:
    include: secret

  # 1. Database (RDS/MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}

  # 2. Thymeleaf (FE)
  thymeleaf:
    cache: false # ÍįúŽįú Žč®Í≥ĄžóźžĄúŽäĒ false Í∂Ćžě•
    prefix: classpath:/templates/
    suffix: .html

  # 3. Security & OAuth 2.0 (Google, Kakao)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar # žļėŽ¶įŽćĒ Í∂ĆŪēú ž∂ĒÍįÄ
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # 4. File Upload (S3)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 5. MyBatis žĄ§ž†ē
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true # DBžĚė snake_caseŽ•ľ JavažĚė camelCaseŽ°ú Žß§ŪēĎ
    jdbc-type-for-null: "NULL"
  type-aliases-package: com.finalproject.coordi

# 6. AWS S3 (Cloud AWS)
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
      auto: false
    s3:
      bucket: ${AWS_S3_BUCKET}

# 7. Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
    operations-sorter: method

# 8. žĽ§žä§ŪÖÄ API Ūā§ ÍīÄŽ¶¨ (Gemini, OpenWeatherMap)
external:
  api:
    gemini:
      key: ${GEMINI_API_KEY}
    weather:
      key: ${WEATHER_API_KEY}

# 9. Sentry (Monitoring)
sentry:
  dsn: ${SENTRY_DSN_BACKEND}
  dsn-frontend: ${SENTRY_DSN_FRONTEND}
  traces-sample-rate: 1.0 # ž∂Ēž†ĀŪē† EventžĚė ŽĻĄžú® žĄ§ž†ē - 1.0žĚÄ 100% ž∂Ēž†Ā, žēĄžßĀ ŽįįŪŹ¨ žĚīž†ĄžĚīŽĮÄŽ°ú 1.0žúľŽ°ú žĄ§ž†ē
  exception-resolver-order: -2147483647 # OrderÍįÄ ŽāģžĚĄžąėŽ°Ě Ž®ľž†Ä ž≤ėŽ¶¨Žź®, SentryÍįÄ žėąžôłŽ•ľ ÍįÄžě• Ž®ľž†Ä ž≤ėŽ¶¨ŪēėŽŹĄŽ°Ě žĄ§ž†ē
  ignored-exceptions-for-type:
    - org.springframework.web.servlet.resource.NoResourceFoundException

logging:
  level:
    root: INFO
    "[com.finalproject.coordi]": DEBUG
