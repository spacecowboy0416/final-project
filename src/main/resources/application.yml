server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: coordi

  profiles:
    include: secret

  # 1. Database (RDS/MySQL)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # 2. Thymeleaf (FE)
  thymeleaf:
    cache: false # 개발 단계에서는 false 권장
    prefix: classpath:/templates/
    suffix: .html

  # 3. Security & OAuth 2.0 (Google, Kakao)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar # 캘린더 권한 추가
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope: profile_nickname, account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # 4. File Upload (S3) 및 정적 리소스 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # DevTools 및 LiveReload 설정 통합
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
      additional-paths: src/main/resources/templates
  web:
    resources:
      chain:
        cache: false

# 5. MyBatis 설정
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true # DB의 snake_case를 Java의 camelCase로 매핑
    jdbc-type-for-null: "NULL"
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  type-aliases-package: com.finalproject.coordi

# 6. Doc 관리 

# 7. Swagger (SpringDoc)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
    operations-sorter: method

# 8. 커스텀 API 키 관리 (Gemini, OpenWeatherMap 등)
external:
  api:
    gemini:
      # 조장님의 SDK 엔드포인트 및 최신 모델(3.1) 적용
      endpoint: ${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com} 
      model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
      url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent} 
      key: ${GEMINI_API_KEY}
      cache:
        enabled: ${GEMINI_PROMPT_CACHE_ENABLED:true}
        ttl-seconds: ${GEMINI_PROMPT_CACHE_TTL_SECONDS:3600}
    # gemini-jin 섹션 제거됨 (불필요한 Dead Code 정리)
    shopping:
      endpoint: ${SHOPPING_API_ENDPOINT:https://openapi.naver.com/v1/search/shop.json}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
    weather:
      key: ${WEATHER_API_KEY}
      current-url: https://api.openweathermap.org/data/2.5/weather
      forecast-url: https://api.openweathermap.org/data/2.5/forecast
      redis:
        key-prefix: ${WEATHER_REDIS_KEY_PREFIX:weather:district}
    kakao:
      local:
        rest-api-key: ${KAKAO_REST_API_KEY}
        coord2region-url: https://dapi.kakao.com/v2/local/geo/coord2regioncode.json
    kakao-map:
      endpoint: ${KAKAO_MAP_ENDPOINT:https://dapi.kakao.com/v2/local/geo/coord2address.json}
      js-key: ${KAKAO_MAP_JS_KEY:}
      admin-key: ${KAKAO_MAP_ADMIN_KEY:}
      auth-scheme: ${KAKAO_MAP_AUTH_SCHEME:KakaoAK}
  storage:
    image:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      base-url: ${IMAGE_STORAGE_BASE_URL:}
      extension: ${IMAGE_STORAGE_EXTENSION:.jpg}
      recommendation-path: ${IMAGE_STORAGE_RECOMMENDATION_PATH:recommendations}

# 8. Sentry (Monitoring)
sentry:
  dsn: ${SENTRY_DSN_BACKEND}
  dsn-frontend: ${SENTRY_DSN_FRONTEND}
  traces-sample-rate: 1.0 # 추적할 Event의 비율 설정 - 1.0은 100% 추적
  exception-resolver-order: -2147483647 # Sentry가 예외를 가장 먼저 처리하도록 설정

# 9. Logging 설정 통합
logging:
  level:
    root: INFO
    "[com.finalproject.coordi]": DEBUG
    "[com.finalproject.coordi.closet.mapper]": TRACE
    "[com.finalproject.coordi.recommend.mapper]": TRACE
    "[com.finalproject.coordi.errorlog.mapper]": TRACE

# JWT 관련 설정
jwt:
  secret: ${JWT_SECRET}

# Redis 캐시 사용 여부
# true  : Redis 캐시 활성화
# false : Redis 없이 실행 (캐시 비활성화, 서버 정상 동작)
app:
  cache:
    redis-enabled: false
